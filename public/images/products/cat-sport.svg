<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1525"/>
      <stop offset="100%" stop-color="#15202f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#1E90FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" fill="url(#glow)"/>
  <!-- Running figure silhouette -->
  <g transform="translate(300,270)" fill="none" stroke="#C9A84C" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <!-- Head -->
    <circle cx="15" cy="-120" r="22"/>
    <!-- Body -->
    <path d="M15,-98 L5,-30"/>
    <!-- Arms -->
    <path d="M5,-75 L-45,-55 L-65,-80"/>
    <path d="M5,-75 L50,-90 L70,-65"/>
    <!-- Legs -->
    <path d="M5,-30 L-40,40 L-70,100"/>
    <path d="M5,-30 L55,30 L45,100"/>
  </g>
  <text x="300" y="530" text-anchor="middle" fill="#C9A84C" font-family="Arial,sans-serif" font-size="16" font-weight="bold" opacity="0.25" letter-spacing="8">SPORTSWEAR</text>
</svg>