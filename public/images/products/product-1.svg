<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1629"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- T-Shirt silhouette -->
  <g transform="translate(300,370)" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <path d="M-90,-120 L-140,-90 L-110,-30 L-70,-50 L-70,120 L70,120 L70,-50 L110,-30 L140,-90 L90,-120 C70,-145 30,-155 0,-155 C-30,-155 -70,-145 -90,-120 Z"/>
    <path d="M-20,-155 C-10,-135 10,-135 20,-155" stroke-opacity="0.5"/>
  </g>
  <!-- Brand -->
  <text x="300" y="720" text-anchor="middle" fill="#C9A84C" font-family="Arial,sans-serif" font-size="14" font-weight="bold" opacity="0.3" letter-spacing="6">Z7SHOP</text>
  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#C9A84C" stroke-width="0.5">
    <line x1="0" y1="200" x2="600" y2="200"/><line x1="0" y1="400" x2="600" y2="400"/><line x1="0" y1="600" x2="600" y2="600"/>
    <line x1="200" y1="0" x2="200" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
  </g>
</svg>