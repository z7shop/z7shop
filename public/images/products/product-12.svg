<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1525"/>
      <stop offset="100%" stop-color="#15202f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#1E90FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Sports Set: T-shirt + Shorts -->
  <g transform="translate(300,320)" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <!-- T-shirt (smaller) -->
    <path d="M-65,-100 L-105,-75 L-85,-25 L-52,-40 L-52,70 L52,70 L52,-40 L85,-25 L105,-75 L65,-100 C50,-120 20,-128 0,-128 C-20,-128 -50,-120 -65,-100 Z"/>
    <path d="M-15,-128 C-7,-115 7,-115 15,-128" stroke-opacity="0.4"/>
  </g>
  <g transform="translate(300,510)" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <!-- Shorts -->
    <path d="M-55,-35 L-60,-35 L-65,5 L-72,65 L-20,65 L-5,-5 L0,0 L5,-5 L20,65 L72,65 L65,5 L60,-35 L55,-35"/>
    <path d="M-60,-35 L60,-35" stroke-opacity="0.5"/>
    <!-- Side stripes -->
    <path d="M-70,30 L-68,65" stroke-opacity="0.3" stroke-width="4"/>
    <path d="M70,30 L68,65" stroke-opacity="0.3" stroke-width="4"/>
  </g>
  <text x="300" y="720" text-anchor="middle" fill="#C9A84C" font-family="Arial,sans-serif" font-size="14" font-weight="bold" opacity="0.3" letter-spacing="6">Z7SHOP</text>
</svg>