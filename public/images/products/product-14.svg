    <path d="M-78,-52 L78,-52" stroke-opacity="0.3" stroke-dasharray="4 3"/>
    <!-- Drawstring -->
    <path d="M-12,-58 L-18,-38" stroke-opacity="0.4"/>
    <path d="M12,-58 L18,-38" stroke-opacity="0.4"/>
    <!-- Side stripes -->
    <path d="M-88,10 L-95,90" stroke="#C9A84C" stroke-opacity="0.25" stroke-width="6"/>
    <path d="M88,10 L95,90" stroke="#C9A84C" stroke-opacity="0.25" stroke-width="6"/>
    <!-- Side pocket -->
    <path d="M-82,-30 L-65,-25 L-60,5" stroke-opacity="0.3"/>
