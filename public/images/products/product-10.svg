<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f1610"/>
      <stop offset="100%" stop-color="#2a1e14"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#8B4513" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Winter Beanie -->
  <g transform="translate(300,380)" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <!-- Main dome -->
    <path d="M-80,30 Q-95,-20 -80,-65 Q-55,-110 0,-120 Q55,-110 80,-65 Q95,-20 80,30"/>
    <!-- Fold/cuff -->
    <path d="M-85,30 Q0,50 85,30" stroke-opacity="0.6"/>
    <path d="M-83,45 Q0,62 83,45" stroke-opacity="0.4"/>
    <!-- Knit texture lines -->
    <path d="M-70,-10 Q0,-25 70,-10" stroke-opacity="0.15"/>
    <path d="M-65,-50 Q0,-65 65,-50" stroke-opacity="0.15"/>
    <path d="M-45,-85 Q0,-98 45,-85" stroke-opacity="0.15"/>
    <!-- Pom-pom -->
    <circle cx="0" cy="-130" r="18" stroke-opacity="0.4"/>
    <circle cx="-5" cy="-133" r="4" stroke-opacity="0.2"/>
    <circle cx="6" cy="-128" r="4" stroke-opacity="0.2"/>
    <circle cx="0" cy="-138" r="3" stroke-opacity="0.2"/>
  </g>
  <text x="300" y="720" text-anchor="middle" fill="#C9A84C" font-family="Arial,sans-serif" font-size="14" font-weight="bold" opacity="0.3" letter-spacing="6">Z7SHOP</text>
</svg>