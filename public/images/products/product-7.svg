<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#1a1a25"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <!-- Jogger Pants -->
  <g transform="translate(300,380)" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
    <path d="M-65,-150 L-75,-150 L-80,-130 L-90,-20 L-85,80 L-60,145 L-55,155 L-25,155 L-20,145 L-5,20 L0,25 L5,20 L20,145 L25,155 L55,155 L60,145 L85,80 L90,-20 L80,-130 L75,-150 L65,-150"/>
