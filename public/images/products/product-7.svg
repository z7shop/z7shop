    <path d="M-70,-150 L70,-150" stroke-opacity="0.6"/>
    <path d="M-65,-145 L65,-145" stroke-opacity="0.3" stroke-dasharray="4 3"/>
    <!-- Drawstring -->
    <path d="M-10,-148 L-15,-130" stroke-opacity="0.4"/>
    <path d="M10,-148 L15,-130" stroke-opacity="0.4"/>
    <!-- Cuff elastic -->
