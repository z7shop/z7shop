    <!-- Cargo pockets -->
    <rect x="-95" y="20" width="30" height="40" rx="3" stroke-opacity="0.4"/>
    <path d="M-80,30 L-80,50" stroke-opacity="0.25"/>
    <rect x="65" y="20" width="30" height="40" rx="3" stroke-opacity="0.4"/>
    <path d="M80,30 L80,50" stroke-opacity="0.25"/>
    <!-- Side pockets -->
